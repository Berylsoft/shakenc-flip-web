<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用cSHAKE256算法抛硬币</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>用cSHAKE256算法抛硬币</h2>
        <textarea id="input" rows="5" placeholder="请输入文本"></textarea>
        <br>
        <div class="button-group">
            <button id="flip">抛硬币！</button>
            <button id="add-time">添加时间</button>
            <button id="clear">清空输入</button>
        </div>
        <h3 id="output"></h3>
        <p>相同的输入（包括空的输入）会永远输出相同的结果。</p>
        <p>为了保持和<a href="https://github.com/Berylsoft/shakenc">shakenc</a> CLI相同的结果，<br><code>custom_string</code>是<code>__shakenc__random-generator</code>。
        </p>
        <p>开源地址：<a href="https://github.com/Berylsoft/shakenc-flip-web">Berylsoft/shakenc-flip-web</a></p>
    </div>
    <script type="module" src="main.js"></script>
</body>

</html>
